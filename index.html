<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><title>商品中心 · 服务策略</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="ssd.css">
</head><body>
<div class="topnav">
  <div class="sb"><span>🔍</span><span class="kw">618 价格管控热点问题</span></div>
  <div class="tnis">
    <div class="tni"><span class="ico">🔔</span>管家<span class="dot"></span></div>
    <div class="tni"><span class="ico">📄</span>协议</div>
    <div class="tni"><span class="ico">⬇️</span>下载</div>
    <div class="tni"><span class="ico">🛡️</span>规则</div>
    <div class="tni"><span class="ico">💬</span>消息<span class="dot"></span></div>
    <div class="tni"><span class="ico">👍</span>反馈</div>
    <div class="tni"><span class="ico">🎧</span>客服</div>
    <div class="av">M</div>
  </div>
</div>

<div class="main">

  <div class="filter">
    <input placeholder="商品标题">
    <input placeholder="商品ID 多个ID以逗号或空格分隔">
    <input placeholder="商家编码">
    <select><option>质量分筛选 请选择</option></select>
    <button class="btn-pri">搜索</button>
    <button class="btn-txt">↻ 重置</button>
    <button class="btn-txt">⇅ 排序</button>
    <button class="btn-txt">展开 ▾</button>
  </div>

  <div class="ops">
    <button class="btn-blue">发布商品</button>
    <button class="btn-w">商品信息更新确认</button>
    <span class="tip-tag">SKU信息待确认</span>
    <button class="btn-w">商品装修</button>
    <button class="btn-w">SKU中心页</button>
    <button class="btn-w dd">更多批量操作</button>
    <button class="btn-w">已选</button>
    <div class="right">
      共<b style="color:#1d2129">19075</b>件商品 | 1/954
      <div class="pager"><span>&lt;</span><span>&gt;</span></div>
    </div>
  </div>

  <div class="alert-strip">
    <span class="ic">⚠</span>
    您有 <b>37</b> 在售商品存在缺货超30天SKU。缺货SKU会在详情展示中被折叠/后置，同时可能影响搜索流量，请尽快补货；若已删除或下架，请忽略
    <span class="more">查看缺货商品</span>
  </div>

  <div class="tw">
  <table>
    <thead><tr>
      <th class="ck"><input type="checkbox"></th>
      <th>商品名称</th>
      <th>价格<span class="srt">⇅</span></th>
      <th>库存<span class="srt">⇅</span></th>
      <th>累计销量<span class="qm">⊙</span></th>
      <th>30日销量<span class="qm">⊙</span></th>
      <th>同款竞争<span class="qm">⊙</span></th>
      <th>创建时间<span class="srt">⇅</span></th>
      <th>发布时间<span class="srt">⇅</span></th>
      <th>操作<span class="qm">⊙</span></th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  </div>
</div>

<div class="mask" id="mask"></div>
<div class="dr" id="dr">
  <div class="dr-h">
    <h3 id="drTitle">一键对标补齐短板</h3>
    <span class="tag" id="drTag">转化率遭挤压</span>
    <span class="x" onclick="closeDr()">×</span>
  </div>
  <div class="dr-b" id="drBody"></div>
  <div class="dr-f">
    <button class="btn-w" onclick="closeDr()">取消</button>
    <button class="btn-pri">一键应用全部建议</button>
  </div>
</div>

<script src="ssd.js"></script>
<script src="ssd2.js"></script>
<script src="ssd3.js"></script>
</body></html>
